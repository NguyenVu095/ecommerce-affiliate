services:
  redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      APP_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; host=os.environ.get('ALLOWED_HOSTS','localhost').split(',')[0]; request=urllib.request.Request('http://127.0.0.1:8000/health/ready', headers={'Host': host}); urllib.request.urlopen(request, timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend-user:
    build:
      context: .
      dockerfile: deploy/frontend-user.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"

  frontend-admin:
    build:
      context: .
      dockerfile: deploy/frontend-admin.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"

  frontend-affiliate:
    build:
      context: .
      dockerfile: deploy/frontend-affiliate.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
        VITE_CUSTOMER_APP_URL: ${VITE_CUSTOMER_APP_URL:?VITE_CUSTOMER_APP_URL is required}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"

volumes:
  redis-data:
